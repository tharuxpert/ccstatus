version: 2

project_name: ccstatus

builds:
  - id: ccstatus
    main: .
    binary: ccstatus
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X ccstatus/cmd.version={{ .Version }} -X ccstatus/cmd.commit={{ .Commit }} -X ccstatus/cmd.date={{ .Date }}

archives:
  - id: archive
    ids:
      - ccstatus
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

brews:
  - name: ccstatus
    repository:
      owner: tharuxpert
      name: homebrew-ccstatus
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/tharuxpert/ccstatus
    description: Claude Code statusline usage CLI
    license: MIT
    install: |
      bin.install "ccstatus"
    test: |
      system "#{bin}/ccstatus", "--version"
    caveats: |
      ccstatus has been installed.

      Run this command to finish setup and enable the Claude Code statusline:

        ccstatus install

      Feedback, ideas, and bug reports:
        https://github.com/tharuxpert/ccstatus/discussions
